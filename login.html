<!DOCTYPE html>
<html>
<head>
    <title>Simple Login Page</title>
</head>
<body style="margin:0; font-family:Arial, sans-serif; background:#f4f4f4; display:flex; justify-content:center; align-items:center; height:100vh;">

    <div style="background:white; padding:30px; width:300px; border-radius:10px; box-shadow:0 0 10px rgba(0,0,0,0.2); text-align:center;">
        <h2 style="margin-bottom:20px; color:#333;">Login</h2>

        <form>
            <input
                type="text"
                placeholder="Username"
                style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;"
            >

            <input
                type="password"
                placeholder="Password"
                style="width:100%; padding:10px; margin-bottom:20px; border:1px solid #ccc; border-radius:5px; box-sizing:border-box;"
            >

            <button
                type="submit"
                style="width:100%; padding:10px; background:#007BFF; color:white; border:none; border-radius:5px; cursor:pointer;"
            >
                Login
            </button>
        </form>

        <p style="margin-top:15px; font-size:14px;">
            Don't have an account?
            <a href="#" style="color:#007BFF; text-decoration:none;">Sign Up</a>
        </p>
    </div>

</body>
</html>
